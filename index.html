    <script>
        (function() {
            'use strict';

            // ── CONFIG ──
            // ✅ REDIRECT IS NOW ENABLED – page will auto-redirect when countdown hits 0
            const AUTO_REDIRECT_ENABLED = true;
            const REDIRECT_URL = 'https://t.me/+_qeG1WiZiEMwZWI9';
            const COUNTDOWN_SECONDS = 10;

            // ── DOM REFS ──
            const dEl = document.getElementById('d');
            const hEl = document.getElementById('h');
            const mEl = document.getElementById('m');
            const sEl = document.getElementById('s');

            let timerInterval = null;
            let remaining = COUNTDOWN_SECONDS;

            // ── HELPERS ──
            function pad(n) {
                return String(n).padStart(2, '0');
            }

            function updateDisplay(secs) {
                dEl.textContent = '00';
                hEl.textContent = '00';
                mEl.textContent = '00';
                sEl.textContent = pad(secs);
            }

            function resetDisplay() {
                dEl.textContent = '00';
                hEl.textContent = '00';
                mEl.textContent = '00';
                sEl.textContent = '00';
            }

            function stopTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }
            }

            function startCountdown() {
                stopTimer();
                remaining = COUNTDOWN_SECONDS;
                updateDisplay(remaining);

                timerInterval = setInterval(function() {
                    remaining -= 1;

                    if (remaining <= 0) {
                        remaining = 0;
                        updateDisplay(remaining);
                        stopTimer();

                        // ✅ REDIRECT NOW WORKS – AUTO_REDIRECT_ENABLED is TRUE
                        if (AUTO_REDIRECT_ENABLED) {
                            window.location.href = REDIRECT_URL;
                        }
                        return;
                    }

                    updateDisplay(remaining);
                }, 1000);
            }

            // ── INIT ──
            if (AUTO_REDIRECT_ENABLED) {
                startCountdown();
            } else {
                resetDisplay();
            }

            // Expose controls globally (optional)
            window.__countdown = {
                start: startCountdown,
                stop: stopTimer,
                reset: resetDisplay,
                setRemaining: function(secs) {
                    remaining = Math.max(0, secs);
                    updateDisplay(remaining);
                }
            };

        })();
    </script>
